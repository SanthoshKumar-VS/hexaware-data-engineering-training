<!DOCTYPE html>
<html>

<head>

    <title>Inventory Status</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f7fc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        .card {
            background: white;
            width: 450px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        
        h1 {
            color: #ff6b00;
        }
        
        .status {
            margin-top: 20px;
            font-size: 28px;
            color: green;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <div class="card">

        <h1>Inventory Availability Status</h1>

        <p>Retail inventory stock is available.</p>

        <div class="status">
            Inventory Available
        </div>

    </div>

</body>

</html>
