<!DOCTYPE html>
<html>

<head>
    <title>Doctor Availability</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f7fc;
            text-align: center;
            padding-top: 100px;
        }
        
        .box {
            background: white;
            width: 400px;
            margin: auto;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            color: #0d6efd;
        }
        
        .status {
            color: green;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="box">
        <h1>Doctor Availability Status</h1>
        <p class="status">Doctor Available</p>
    </div>

</body>

</html>
